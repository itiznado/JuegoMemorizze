<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Juego de Memoria</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Juego de Memoria</h1>
    </header>

    <!-- Banner izquierdo: imágenes en loop vertical -->
    <aside class="banner-left" aria-hidden="true">
      <div class="banner-track">
        <!-- Primer set de imágenes -->
        <img src="Assets/bannerzazu/zazu1.jpg" alt="" />
        <img src="Assets/bannerzazu/zazu2.jpg" alt="" />
        <img src="Assets/bannerzazu/zazu3.jpg" alt="" />
        <img src="Assets/bannerzazu/zazu4.jpg" alt="" />
        <img src="Assets/bannerzazu/zazu5.jpg" alt="" />
        <img src="Assets/bannerzazu/zazu6.jpg" alt="" />
        <img src="Assets/bannerzazu/zazu7.jpg" alt="" />
        <img src="Assets/bannerzazu/zazu8.jpg" alt="" />
        <img src="Assets/bannerzazu/zazu9.jpg" alt="" />
        <img src="Assets/bannerzazu/zazu10.jpg" alt="" />
        <!-- Segundo set: copia exacta para el loop sin salto -->
        <img src="Assets/bannerzazu/zazu1.jpg" alt="" />
        <img src="Assets/bannerzazu/zazu2.jpg" alt="" />
        <img src="Assets/bannerzazu/zazu3.jpg" alt="" />
        <img src="Assets/bannerzazu/zazu4.jpg" alt="" />
        <img src="Assets/bannerzazu/zazu5.jpg" alt="" />
        <img src="Assets/bannerzazu/zazu6.jpg" alt="" />
        <img src="Assets/bannerzazu/zazu7.jpg" alt="" />
        <img src="Assets/bannerzazu/zazu8.jpg" alt="" />
        <img src="Assets/bannerzazu/zazu9.jpg" alt="" />
        <img src="Assets/bannerzazu/zazu10.jpg" alt="" />
      </div>
    </aside>

    <main class="layout">

      <!-- COLUMNA IZQUIERDA: solo el tablero -->
      <div class="board-area">
        <section
          id="board"
          class="board"
          role="grid"
          aria-label="Tablero de cartas"
        ></section>
      </div>
      <!-- COLUMNA DERECHA: sidebar con todos los datos -->
      <aside class="sidebar">
        <div class="sidebar-inner">

          <h2 class="sidebar-title">Memoria</h2>

          <!-- Marcadores -->
          <div class="stat-block">
            <span class="stat-label">Tiempo</span>
            <span id="timer" class="stat-value mono">0s</span>
          </div>

          <div class="stat-block">
            <span class="stat-label">Movimientos</span>
            <span id="move-count" class="stat-value mono">0</span>
          </div>

          <div class="stat-block">
            <span class="stat-label">Mejor puntaje</span>
            <span id="best-score" class="stat-value mono">--</span>
          </div>

          <hr class="sidebar-divider" />

          <!-- Controles -->
          <div class="sidebar-controls">
            <label class="control-label" for="difficulty-select">Dificultad</label>
            <select id="difficulty-select">
              <option value="8">Fácil — 8 parejas</option>
              <option value="12">Medio — 12 parejas</option>
              <option value="18">Difícil — 18 parejas</option>
            </select>
            <button id="restart-btn" type="button">Reiniciar</button>
          </div>

          <div id="victory-msg" class="victory-msg hidden" role="alert" aria-live="polite">
            <h2>¡Ganaste! 🎉</h2>
            <p id="victory-details"></p>
            <button id="play-again-btn" type="button">Jugar de nuevo</button>
          </div>

          <p class="keyboard-hint">Presiona <kbd>R</kbd> para reiniciar</p>
        </div>
      </aside>

    </main>

    <canvas id="confetti-canvas"> </canvas>

    <!-- El script va al final para que el DOM ya exista cuando se ejecuta -->
    <script src="script.js"></script>
  </body>
</html>
